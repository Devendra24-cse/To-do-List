<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <h1 class="heading">To Do List</h1>
        <div class="window-inputs">
            <div>
                <div class="input-user">
                    <input type="text" id="input-user"><button id="btn-add">ADD</button>                    
                </div>
                <div class="input-default">
                    <button class="button-default-task">GYM</button>
                    <button class="button-default-task">Sleep</button>
                    <button class="button-default-task">Reading</button>
                    <button class="button-default-task">Texting Her</button>
                    <button class="button-default-task">Watch Movie</button>
                    <button class="button-default-task">Nothing</button>   
                </div>

                

            </div>
            
        </div>
        <div class="window-tasks">
                <div class="onlyheading">
                    <h1>Today's Task </h1>
                </div>
                <div class="others">
                    <ul id="tasks-all"></ul>
                </div>           
        </div>

       
    </div>

    <script src="script.js"></script>
</body>
</html>
